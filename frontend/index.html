<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memory-Augmented Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0D18;
    --bg-vignette: radial-gradient(1100px 700px at 15% -10%, #151B33 0%, transparent 60%),
                    radial-gradient(900px 600px at 100% 110%, #131730 0%, transparent 55%);
    --panel: #10142380;
    --panel-solid: #10142B;
    --panel-raised: #161B33;
    --border: #232A47;
    --border-soft: #1B2038;
    --text: #EEF0F8;
    --muted: #8992AD;
    --faint: #565F7E;

    --node-memory: #5EE6C4;
    --node-router: #C7CCE0;
    --node-rag: #5B8CFF;
    --node-tool: #F5A94F;
    --node-direct: #B48CFF;
    --node-model: #FF6E8E;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    background-image: var(--bg-vignette);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }
  .display { font-family: 'Space Grotesk', sans-serif; }

  #app {
    display: grid;
    grid-template-columns: 1fr 300px;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  @media (max-width: 880px) {
    #app { grid-template-columns: 1fr; }
    #trace-panel { display: none; }
  }

  /* ---------- Header ---------- */
  #header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 30px;
    border-bottom: 1px solid var(--border-soft);
  }

  #brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  #logo-mark {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
  }

  #header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin: 0;
    color: var(--text);
  }

  #header .sub {
    font-size: 12px;
    color: var(--faint);
    margin-top: 3px;
    font-weight: 400;
  }

  #user-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--faint);
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  #user-badge input {
    background: var(--panel-raised);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 7px 11px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    width: 108px;
    text-transform: none;
    transition: border-color 0.2s ease;
  }
  #user-badge input:focus {
    outline: none;
    border-color: var(--node-rag);
  }

  /* ---------- Chat column ---------- */
  #chat-col {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 36px 48px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
  }

  .msg {
    max-width: 90%;
    display: flex;
    flex-direction: column;
    gap: 7px;
    animation: rise 0.28s ease;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.bot { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 15px 19px;
    border-radius: 14px;
    line-height: 1.75;
    font-size: 16px;
    white-space: pre-wrap;
    letter-spacing: 0.001em;
    color: #F7F8FC;
  }
  .msg.user .bubble {
    background: linear-gradient(155deg, #232A4C, #1D2342);
    border: 1px solid #2B3358;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: #151A30;
    border: 1px solid #262D4E;
    border-bottom-left-radius: 4px;
  }

  .meta {
    font-size: 10.5px;
    color: var(--faint);
    padding: 0 5px;
    display: flex;
    gap: 8px;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
  }

  .route-chip {
    font-size: 9.5px;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .route-chip.rag    { background: color-mix(in srgb, var(--node-rag) 16%, transparent);    color: var(--node-rag); }
  .route-chip.tool   { background: color-mix(in srgb, var(--node-tool) 16%, transparent);   color: var(--node-tool); }
  .route-chip.direct { background: color-mix(in srgb, var(--node-direct) 16%, transparent);  color: var(--node-direct); }

  .sources { font-size: 11px; color: var(--faint); padding: 0 5px; }

  .typing-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }
  .typing-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--faint);
    animation: pulse 1.1s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes pulse { 0%, 60%, 100% { opacity: 0.25; transform: scale(0.85); } 30% { opacity: 1; transform: scale(1); } }

  /* ---------- Input bar ---------- */
  #input-bar {
    display: flex;
    align-items: stretch;
    gap: 10px;
    padding: 16px 48px 32px;
    flex-wrap: wrap;
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    box-sizing: border-box;
  }

  #input-shell {
    flex: 1 1 320px;
    min-width: 220px;
    display: flex;
    align-items: center;
    min-height: 52px;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 6px 8px 6px 20px;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  #input-shell:focus-within {
    border-color: var(--node-rag);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--node-rag) 14%, transparent);
  }

  #msg-input {
    flex: 1;
    resize: none;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15.5px;
    line-height: 1.5;
    padding: 12px 0;
    min-height: 24px;
    max-height: 140px;
  }
  #msg-input:focus { outline: none; }
  #msg-input::placeholder { color: var(--faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  #send-btn {
    flex-shrink: 0;
    height: 52px;
    background: linear-gradient(135deg, var(--node-rag), #7C6BFF);
    color: #060A18;
    border: none;
    border-radius: 11px;
    padding: 0 24px;
    font-weight: 600;
    font-size: 13.5px;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
    white-space: nowrap;
  }
  #send-btn:hover:not(:disabled) { transform: translateY(-1px); }
  #send-btn:disabled { opacity: 0.35; cursor: default; }
  #send-btn:focus-visible { outline: 2px solid var(--text); }

  #upload-btn {
    flex-shrink: 0;
    height: 52px;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 11px;
    padding: 0 18px;
    font-weight: 500;
    font-size: 13.5px;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
  }
  #upload-btn:hover { border-color: var(--node-memory); color: var(--node-memory); }
  #upload-btn:disabled { opacity: 0.35; cursor: default; }
  #upload-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  @media (max-width: 720px) {
    #input-shell { flex-basis: 100%; }
    #upload-btn, #send-btn { flex: 1; }
    #upload-btn span, #send-btn span { display: inline; }
  }

  .upload-toast {
    font-size: 11.5px;
    font-family: 'JetBrains Mono', monospace;
    padding: 8px 14px;
    border-radius: 8px;
    margin: 0 26px;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: rise 0.25s ease;
  }
  .upload-toast.pending {
    background: color-mix(in srgb, var(--node-router) 10%, transparent);
    color: var(--muted);
    border: 1px solid var(--border-soft);
  }
  .upload-toast.success {
    background: color-mix(in srgb, var(--node-memory) 14%, transparent);
    color: var(--node-memory);
    border: 1px solid color-mix(in srgb, var(--node-memory) 30%, transparent);
  }
  .upload-toast.error {
    background: color-mix(in srgb, var(--node-model) 14%, transparent);
    color: var(--node-model);
    border: 1px solid color-mix(in srgb, var(--node-model) 30%, transparent);
  }

  /* ---------- Trace panel ---------- */
  #trace-panel {
    grid-row: 2;
    border-left: 1px solid var(--border-soft);
    padding: 30px 24px;
    display: flex;
    flex-direction: column;
    gap: 26px;
    overflow-y: auto;
    background: linear-gradient(180deg, transparent, #0A0D1840 60%);
  }

  #trace-panel h2 {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--faint);
    margin: 0 0 16px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }

  .pipeline { display: flex; flex-direction: column; }

  .node {
    display: flex;
    align-items: flex-start;
    gap: 13px;
    position: relative;
    padding-bottom: 24px;
  }
  .node:last-child { padding-bottom: 0; }

  .node .stem { width: 11px; display: flex; flex-direction: column; align-items: center; }
  .node .dot {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--border);
    transition: background 0.4s ease, box-shadow 0.4s ease;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .node .line {
    width: 1.5px; flex: 1; min-height: 20px;
    background: var(--border-soft);
    margin-top: 3px;
    transition: background 0.4s ease;
  }
  .node:last-child .line { display: none; }

  .node .label { padding-top: -1px; }
  .node .label .name {
    display: block;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--faint);
    transition: color 0.4s ease;
  }
  .node .label .desc {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--faint);
    margin-top: 2px;
    opacity: 0.7;
  }

  .node.active .dot {
    background: var(--node-color, var(--node-rag));
    box-shadow: 0 0 0 5px color-mix(in srgb, var(--node-color, var(--node-rag)) 18%, transparent),
                0 0 12px color-mix(in srgb, var(--node-color, var(--node-rag)) 55%, transparent);
  }
  .node.active .line { background: var(--node-color, var(--node-rag)); opacity: 0.35; }
  .node.active .label .name { color: var(--text); }
  .node.active .label .desc { color: var(--node-color, var(--node-rag)); opacity: 1; }

  #memory-box, #sources-box { border-top: 1px solid var(--border-soft); padding-top: 20px; }

  .kv {
    display: flex; justify-content: space-between;
    font-size: 12px; padding: 6px 0;
    color: var(--muted);
    border-bottom: 1px dashed var(--border-soft);
  }
  .kv span:last-child {
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; text-align: right; max-width: 58%;
  }

  .empty-hint { font-size: 11.5px; color: var(--faint); font-style: italic; line-height: 1.5; }

  #sources-box a {
    display: block; font-size: 11.5px; color: var(--node-rag);
    text-decoration: none; padding: 5px 0; word-break: break-all;
    font-family: 'JetBrains Mono', monospace;
  }
  #sources-box a:hover { text-decoration: underline; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 2px 5px 0;
  }
  .suggestion-chip {
    font-size: 12.5px;
    font-family: 'Inter', sans-serif;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 13px;
    border-radius: 20px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .suggestion-chip:hover {
    border-color: var(--node-rag);
    color: var(--text);
  }


</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div id="brand">
      <svg id="logo-mark" viewBox="0 0 32 32" fill="none">
        <circle cx="8" cy="8" r="3.4" fill="#5EE6C4"/>
        <circle cx="24" cy="8" r="3.4" fill="#5B8CFF"/>
        <circle cx="16" cy="24" r="3.4" fill="#FF6E8E"/>
        <path d="M10.8 9.6L21.2 9.6M9.6 10.8L15 21.5M22.4 10.8L17 21.5" stroke="#2B3358" stroke-width="1.6"/>
      </svg>
      <div>
        <h1>Memory-Augmented Chatbot</h1>
        <div class="sub">RAG &nbsp;·&nbsp; Knowledge Graph &nbsp;·&nbsp; LangGraph routing &nbsp;·&nbsp; Long-term memory</div>
      </div>
    </div>
    <div id="user-badge">
      user_id <input id="user-id-input" value="user_123" />
    </div>
  </div>

  <div id="chat-col">
    <div id="messages"></div>
    <div id="upload-toast-container"></div>
    <div id="input-bar">
      <div id="input-shell">
        <textarea id="msg-input" placeholder="Ask a question, or upload a document..." rows="1"></textarea>
      </div>
      <input type="file" id="file-input" accept=".pdf,.txt,.md" style="display:none" />
      <button id="upload-btn" title="Upload a PDF or text file to add to the knowledge base">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload
      </button>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <div id="trace-panel">
    <div>
      <h2>Pipeline trace</h2>
      <div class="pipeline" id="pipeline"></div>
    </div>

    <div id="sources-box">
      <h2>Sources used</h2>
      <div id="sources-list" class="empty-hint">No sources yet — ask a knowledge question.</div>
    </div>

    <div id="memory-box">
      <h2>Remembered about this user</h2>
      <div id="memory-list" class="empty-hint">Nothing stored yet.</div>
    </div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const userIdInput = document.getElementById('user-id-input');
const pipelineEl = document.getElementById('pipeline');
const sourcesListEl = document.getElementById('sources-list');
const memoryListEl = document.getElementById('memory-list');
const uploadBtn = document.getElementById('upload-btn');
const fileInput = document.getElementById('file-input');
const toastContainer = document.getElementById('upload-toast-container');

const NODES = [
  { id: 'memory_node', name: 'Memory node', desc: 'load user context', color: 'var(--node-memory)' },
  { id: 'router_node', name: 'Router node', desc: 'classify the query', color: 'var(--node-router)' },
  { id: 'branch_node',  name: '—', desc: '', color: 'var(--node-rag)' },
  { id: 'model_node',  name: 'Model node', desc: 'synthesize answer', color: 'var(--node-model)' },
];

const ROUTE_INFO = {
  rag:    { name: 'RAG + KG node', desc: 'static knowledge + graph facts', color: 'var(--node-rag)' },
  tool:   { name: 'Tool node',     desc: 'live web search',               color: 'var(--node-tool)' },
  direct: { name: 'Direct',        desc: 'skip retrieval',                color: 'var(--node-direct)' },
};

function renderPipeline(activeRoute) {
  pipelineEl.innerHTML = '';
  NODES.forEach((node) => {
    let display = node;
    if (node.id === 'branch_node' && activeRoute) display = ROUTE_INFO[activeRoute];
    const el = document.createElement('div');
    el.className = 'node' + (activeRoute ? ' active' : '');
    el.style.setProperty('--node-color', display.color);
    el.innerHTML = `
      <div class="stem"><div class="dot"></div><div class="line"></div></div>
      <div class="label"><span class="name">${display.name}</span><span class="desc">${display.desc}</span></div>
    `;
    pipelineEl.appendChild(el);
  });
}
renderPipeline(null);

function addMessage(role, text, meta) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (role === 'user' ? 'user' : 'bot');

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);

  if (meta && meta.route) {
    const metaRow = document.createElement('div');
    metaRow.className = 'meta';
    metaRow.innerHTML = `<span class="route-chip ${meta.route}">${meta.route}</span>`;
    wrap.appendChild(metaRow);
  }

  if (meta && meta.suggestions && meta.suggestions.length > 0) {
    const suggWrap = document.createElement('div');
    suggWrap.className = 'suggestions';
    meta.suggestions.forEach(q => {
      const chip = document.createElement('button');
      chip.className = 'suggestion-chip';
      chip.textContent = q;
      chip.addEventListener('click', () => {
        inputEl.value = q;
        sendMessage();
      });
      suggWrap.appendChild(chip);
    });
    wrap.appendChild(suggWrap);
  }

  messagesEl.appendChild(wrap);
  scrollToMessageTop(wrap);
  return wrap;
}

function addTypingBubble() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.innerHTML = `<div class="bubble"><span class="typing-dots"><span></span><span></span><span></span></span></div>`;
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return wrap;
}

function renderSources(sources) {
  if (!sources || sources.length === 0) {
    sourcesListEl.className = 'empty-hint';
    sourcesListEl.textContent = 'No sources for this answer.';
    return;
  }
  sourcesListEl.className = '';
  sourcesListEl.innerHTML = sources.map(s => `<a href="${s}" target="_blank" rel="noopener">${s}</a>`).join('');
}

async function refreshMemory() {
  const userId = userIdInput.value.trim() || 'user_123';
  try {
    const res = await fetch(`${API_BASE}/memory/${encodeURIComponent(userId)}`);
    const data = await res.json();
    const prefs = data.preferences || {};
    const keys = Object.keys(prefs);
    if (keys.length === 0) {
      memoryListEl.className = 'empty-hint';
      memoryListEl.textContent = 'Nothing stored yet — try "my name is..." or "I like...".';
    } else {
      memoryListEl.className = '';
      memoryListEl.innerHTML = keys.map(k => `<div class="kv"><span>${k}</span><span>${prefs[k]}</span></div>`).join('');
    }
  } catch (e) { /* best-effort */ }
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  const userId = userIdInput.value.trim() || 'user_123';

  addMessage('user', text);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  const typingEl = addTypingBubble();
  renderPipeline('rag');

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, message: text }),
    });
    const data = await res.json();

    typingEl.remove();
    addMessage('bot', data.answer || '(no answer returned)', { route: data.route, suggestions: data.suggestions });
    renderPipeline(data.route);
    renderSources(data.sources);
    refreshMemory();
  } catch (err) {
    typingEl.remove();
    addMessage('bot', 'Error reaching the API. Is uvicorn still running on :8000?');
    renderPipeline(null);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});
userIdInput.addEventListener('change', refreshMemory);

function showToast(kind, text) {
  toastContainer.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'upload-toast ' + kind;
  el.textContent = text;
  toastContainer.appendChild(el);
  if (kind !== 'pending') {
    setTimeout(() => { el.remove(); }, 6000);
  }
  return el;
}

uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;

  uploadBtn.disabled = true;
  showToast('pending', `Uploading "${file.name}"...`);

  const userId = userIdInput.value.trim() || 'user_123';
  const formData = new FormData();
  formData.append('file', file);

  try {
    const res = await fetch(`${API_BASE}/upload?user_id=${encodeURIComponent(userId)}`, { method: 'POST', body: formData });
    const data = await res.json();

    if (data.error) {
      showToast('error', `Upload failed: ${data.error}`);
    } else {
      showToast('success', `"${data.filename}" indexed (${data.chunks_indexed} chunks) — ask me about it!`);
    }
  } catch (err) {
    showToast('error', 'Upload failed: could not reach the server.');
  } finally {
    uploadBtn.disabled = false;
    fileInput.value = '';
  }
});

addMessage('bot', "Hi — I'm grounded in a scraped Wikipedia knowledge base (RAG), a Neo4j knowledge graph, and I remember what you tell me across turns. Ask me something, or upload your own PDF/text file.");
refreshMemory();


</script>
